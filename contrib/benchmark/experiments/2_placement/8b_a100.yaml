nodes:
  - gpu: NVDA:A100_80G:SXM
    count: 1
    gpus_per_node: 1
    cost: 10.97  # p5.48xlarge
placement_strategy: "maximize_replicas"
placement_config:
  memory_threshold: 0.75
workload:
